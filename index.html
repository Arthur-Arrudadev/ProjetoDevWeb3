<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Estudo</title>
  <link rel="stylesheet" href="frontend/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-circle">📚</div>
        <h1>Sistema de Estudo</h1>
        <p>Faça login para continuar</p>
      </div>

      <div class="alert danger" id="alertErro"></div>

      <form id="formLogin" novalidate>
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="username">
          <div class="erro-msg" id="erroUsuario">Campo obrigatório</div>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
          <div class="erro-msg" id="erroSenha">Campo obrigatório</div>
        </div>
        <button type="submit" class="btn-primary" id="btnLogin">Entrar</button>
      </form>

      <p style="text-align:center;margin-top:16px;font-size:12px;color:#94a3b8;">
        Usuário: <strong>geral</strong> | Senha: <strong>entrar</strong>
      </p>
    </div>
  </div>

  <script>
    // Credenciais válidas (login local, sem depender da API)
    const USUARIOS_VALIDOS = [
      { usuario: 'geral', senha: 'entrar', id: 1, nome: 'Usuário Geral' }
    ];

    function getUsuario() {
      try { return JSON.parse(localStorage.getItem('usuario')); } catch { return null; }
    }

    function irDashboard() {
      const base = window.location.href.replace(/\/[^\/]+$/, '');
      window.location.href = base + '/frontend/pages/dashboard.html';
    }

    // Já logado? Vai direto (só redireciona se vier de outra página, não do logout)
    if (getUsuario() && document.referrer === '') {
      // não redireciona automaticamente — deixa o usuário fazer login
    }

    document.getElementById('formLogin').addEventListener('submit', function(e) {
      e.preventDefault();

      const usuario = document.getElementById('usuario').value.trim();
      const senha   = document.getElementById('senha').value.trim();

      // Limpa erros anteriores
      document.getElementById('usuario').classList.remove('erro');
      document.getElementById('senha').classList.remove('erro');
      document.getElementById('erroUsuario').style.display = 'none';
      document.getElementById('erroSenha').style.display   = 'none';
      document.getElementById('alertErro').style.display   = 'none';

      let valido = true;
      if (!usuario) {
        document.getElementById('usuario').classList.add('erro');
        document.getElementById('erroUsuario').style.display = 'block';
        valido = false;
      }
      if (!senha) {
        document.getElementById('senha').classList.add('erro');
        document.getElementById('erroSenha').style.display = 'block';
        valido = false;
      }
      if (!valido) return;

      // Valida credenciais localmente (instantâneo, sem API)
      const encontrado = USUARIOS_VALIDOS.find(
        u => u.usuario === usuario && u.senha === senha
      );

      if (encontrado) {
        localStorage.setItem('usuario', JSON.stringify({
          id: encontrado.id,
          nome: encontrado.nome,
          usuario: encontrado.usuario
        }));
        irDashboard();
      } else {
        const el = document.getElementById('alertErro');
        el.textContent = 'Usuário ou senha incorretos';
        el.style.display = 'block';
      }
    });
  </script>
</body>
</html>
