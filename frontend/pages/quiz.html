<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Sistema de Estudo</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .quiz-opcao {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer; margin-bottom: 10px;
      transition: all 0.2s; font-size: 14px; background: #fff;
    }
    .quiz-opcao:hover:not(.bloqueada) { border-color: var(--primary); background: #f5f3ff; }
    .quiz-opcao.correta  { border-color: #10b981; background: #d1fae5; }
    .quiz-opcao.errada   { border-color: #ef4444; background: #fee2e2; }
    .quiz-opcao.bloqueada { cursor: default; }
    .quiz-letra {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--border); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .quiz-progresso {
      display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .quiz-dot {
      width: 10px; height: 10px; border-radius: 50%; background: var(--border);
    }
    .quiz-dot.acerto  { background: #10b981; }
    .quiz-dot.erro    { background: #ef4444; }
    .quiz-dot.revisao { background: #f59e0b; }
    .quiz-dot.atual   { background: var(--primary); }
    #telaSelecao, #telaQuiz, #telaResultado { display: none; }
    .materia-btn {
      padding: 14px 20px; border: 2px solid var(--border); border-radius: 10px;
      background: #fff; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.2s; text-align: left;
    }
    .materia-btn:hover { border-color: var(--primary); background: #f5f3ff; color: var(--primary); }
    .resultado-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .btn-revisao {
      padding: 6px 14px; border: 1.5px solid #f59e0b; border-radius: 6px;
      background: #fef3c7; color: #92400e; cursor: pointer; font-size: 12px;
      font-weight: 600; transition: all 0.2s;
    }
    .btn-revisao:hover { background: #fde68a; }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main">
    <div class="page-title">🧠 Quiz</div>

    <!-- Tela de seleção de matéria -->
    <div id="telaSelecao">
      <div class="card">
        <div class="card-title">Escolha a Matéria</div>
        <div id="listaMaterias" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;"></div>
      </div>
    </div>

    <!-- Tela do Quiz -->
    <div id="telaQuiz">
      <div class="card" style="max-width:700px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div style="font-size:13px;font-weight:700;color:var(--primary);" id="quizMateria"></div>
          <div style="font-size:13px;color:var(--muted);">Questão <span id="quizNumero"></span> de 10</div>
        </div>
        <div class="quiz-progresso" id="quizProgresso"></div>
        <div style="font-size:15px;font-weight:600;margin-bottom:20px;line-height:1.5;" id="quizEnunciado"></div>
        <div id="quizAlternativas"></div>
        <div id="quizFeedback" style="display:none;margin-top:14px;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;"></div>
        <div style="display:flex;gap:10px;margin-top:18px;">
          <button id="btnRevisar" class="btn-revisao" style="display:none;" onclick="marcarRevisao()">🔄 Marcar para Revisão</button>
          <button id="btnProxima" onclick="proximaQuestao()"
            style="display:none;padding:10px 24px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
            Próxima →
          </button>
        </div>
      </div>
    </div>

    <!-- Tela de Resultado -->
    <div id="telaResultado">
      <div class="card" style="max-width:600px;">
        <div style="text-align:center;margin-bottom:24px;">
          <div style="font-size:48px;margin-bottom:8px;" id="resultadoEmoji"></div>
          <div style="font-size:22px;font-weight:700;" id="resultadoTitulo"></div>
          <div style="font-size:14px;color:var(--muted);margin-top:4px;" id="resultadoSubtitulo"></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
          <div style="text-align:center;padding:16px;background:#d1fae5;border-radius:10px;">
            <div style="font-size:28px;font-weight:700;color:#065f46;" id="resAcertos"></div>
            <div style="font-size:12px;color:#065f46;">Acertos</div>
          </div>
          <div style="text-align:center;padding:16px;background:#fee2e2;border-radius:10px;">
            <div style="font-size:28px;font-weight:700;color:#991b1b;" id="resErros"></div>
            <div style="font-size:12px;color:#991b1b;">Erros</div>
          </div>
          <div style="text-align:center;padding:16px;background:#fef3c7;border-radius:10px;">
            <div style="font-size:28px;font-weight:700;color:#92400e;" id="resRevisao"></div>
            <div style="font-size:12px;color:#92400e;">Revisão</div>
          </div>
        </div>
        <div id="listaRevisao" style="margin-bottom:20px;"></div>
        <div style="display:flex;gap:10px;">
          <button onclick="reiniciarQuiz()"
            style="flex:1;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
            🔁 Refazer
          </button>
          <button onclick="voltarSelecao()"
            style="flex:1;padding:12px;background:#f1f5f9;color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
            ← Outras Matérias
          </button>
        </div>
      </div>
    </div>

  </main>

  <script src="../js/app.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    protegerPagina();
    document.getElementById('sidebar').innerHTML = renderSidebar('quiz.html');

    const usuario = getUsuario();
    let questoes = [], atual = 0, respostas = [], materiaSelecionada = '';

    async function carregarMaterias() {
      document.getElementById('telaSelecao').style.display = 'block';
      try {
        const materias = await api('/quiz-materias');
        const icons = { 'Matemática':'📐','Português':'📝','História':'🏛️','Física':'⚡','Química':'🧪','Biologia':'🔬' };
        document.getElementById('listaMaterias').innerHTML = materias.map(m =>
          `<button class="materia-btn" onclick="iniciarQuiz('${m}')">${icons[m] || '📚'} ${m}</button>`
        ).join('');
      } catch {
        document.getElementById('listaMaterias').innerHTML = '<p style="color:#ef4444">Erro ao carregar matérias.</p>';
      }
    }

    async function iniciarQuiz(materia) {
      materiaSelecionada = materia;
      try {
        questoes = await api(`/quiz/${encodeURIComponent(materia)}`);
      } catch {
        alert('Erro ao carregar questões.'); return;
      }
      atual = 0;
      respostas = new Array(questoes.length).fill(null);
      document.getElementById('telaSelecao').style.display = 'none';
      document.getElementById('telaResultado').style.display = 'none';
      document.getElementById('telaQuiz').style.display = 'block';
      renderQuestao();
    }

    function renderQuestao() {
      const q = questoes[atual];
      document.getElementById('quizMateria').textContent = materiaSelecionada;
      document.getElementById('quizNumero').textContent = atual + 1;
      document.getElementById('quizEnunciado').textContent = q.enunciado;
      document.getElementById('quizFeedback').style.display = 'none';
      document.getElementById('btnProxima').style.display = 'none';
      document.getElementById('btnRevisar').style.display = 'none';

      // Progresso
      document.getElementById('quizProgresso').innerHTML = questoes.map((_, i) => {
        let cls = 'quiz-dot';
        if (i === atual) cls += ' atual';
        else if (respostas[i] === 'acerto') cls += ' acerto';
        else if (respostas[i] === 'erro') cls += ' erro';
        else if (respostas[i] === 'revisao') cls += ' revisao';
        return `<div class="${cls}"></div>`;
      }).join('');

      const letras = ['a','b','c','d'];
      const textos = [q.alternativa_a, q.alternativa_b, q.alternativa_c, q.alternativa_d];
      document.getElementById('quizAlternativas').innerHTML = letras.map((l, i) =>
        `<div class="quiz-opcao" id="op_${l}" onclick="responder('${l}')">
          <div class="quiz-letra">${l.toUpperCase()}</div>
          <span>${textos[i]}</span>
        </div>`
      ).join('');
    }

    function responder(letra) {
      const q = questoes[atual];
      const correta = q.resposta_correta;
      const acertou = letra === correta;

      // Bloqueia todas as opções
      ['a','b','c','d'].forEach(l => {
        const el = document.getElementById(`op_${l}`);
        el.classList.add('bloqueada');
        el.onclick = null;
        if (l === correta) el.classList.add('correta');
        else if (l === letra && !acertou) el.classList.add('errada');
      });

      const fb = document.getElementById('quizFeedback');
      if (acertou) {
        respostas[atual] = 'acerto';
        fb.style.cssText = 'display:block;background:#d1fae5;color:#065f46;margin-top:14px;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;';
        fb.textContent = '✅ Correto!';
      } else {
        respostas[atual] = 'erro';
        fb.style.cssText = 'display:block;background:#fee2e2;color:#991b1b;margin-top:14px;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;';
        fb.textContent = `❌ Errado! A resposta correta é a alternativa ${correta.toUpperCase()}.`;
        document.getElementById('btnRevisar').style.display = 'inline-block';
      }

      document.getElementById('btnProgresso') && renderQuestao();
      // Atualiza dots
      document.getElementById('quizProgresso').innerHTML = questoes.map((_, i) => {
        let cls = 'quiz-dot';
        if (i === atual) cls += ' atual';
        else if (respostas[i] === 'acerto') cls += ' acerto';
        else if (respostas[i] === 'erro') cls += ' erro';
        else if (respostas[i] === 'revisao') cls += ' revisao';
        return `<div class="${cls}"></div>`;
      }).join('');

      document.getElementById('btnProxima').style.display = 'inline-block';
      document.getElementById('btnProxima').textContent = atual < questoes.length - 1 ? 'Próxima →' : 'Ver Resultado';
    }

    function marcarRevisao() {
      respostas[atual] = 'revisao';
      document.getElementById('btnRevisar').style.display = 'none';
      // Atualiza dot atual
      document.getElementById('quizProgresso').innerHTML = questoes.map((_, i) => {
        let cls = 'quiz-dot';
        if (i === atual) cls += ' atual';
        else if (respostas[i] === 'acerto') cls += ' acerto';
        else if (respostas[i] === 'erro') cls += ' erro';
        else if (respostas[i] === 'revisao') cls += ' revisao';
        return `<div class="${cls}"></div>`;
      }).join('');
    }

    function proximaQuestao() {
      if (atual < questoes.length - 1) {
        atual++;
        renderQuestao();
      } else {
        mostrarResultado();
      }
    }

    async function mostrarResultado() {
      document.getElementById('telaQuiz').style.display = 'none';
      document.getElementById('telaResultado').style.display = 'block';

      const acertos = respostas.filter(r => r === 'acerto').length;
      const erros   = respostas.filter(r => r === 'erro').length;
      const revisao = respostas.filter(r => r === 'revisao').length;
      const taxa = Math.round(acertos / questoes.length * 100);

      document.getElementById('resAcertos').textContent = acertos;
      document.getElementById('resErros').textContent   = erros;
      document.getElementById('resRevisao').textContent = revisao;

      const emoji = taxa >= 80 ? '🏆' : taxa >= 60 ? '👍' : taxa >= 40 ? '📚' : '💪';
      const titulo = taxa >= 80 ? 'Excelente!' : taxa >= 60 ? 'Bom trabalho!' : taxa >= 40 ? 'Continue estudando!' : 'Não desista!';
      document.getElementById('resultadoEmoji').textContent = emoji;
      document.getElementById('resultadoTitulo').textContent = titulo;
      document.getElementById('resultadoSubtitulo').textContent = `${taxa}% de acerto em ${materiaSelecionada}`;

      // Lista questões para revisão
      const paraRevisar = questoes.filter((_, i) => respostas[i] === 'revisao' || respostas[i] === 'erro');
      if (paraRevisar.length > 0) {
        document.getElementById('listaRevisao').innerHTML = `
          <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;">Para Revisar</div>
          ${paraRevisar.map((q, i) => `
            <div class="resultado-item">
              <span>${i+1}. ${q.enunciado.substring(0,60)}${q.enunciado.length>60?'...':''}</span>
              <span style="font-size:12px;color:#64748b;">Resp: ${q.resposta_correta.toUpperCase()}</span>
            </div>
          `).join('')}
        `;
      }

      // Salva no histórico
      try {
        await api('/quiz/resultado', {
          method: 'POST',
          body: JSON.stringify({ usuario_id: usuario.id, assunto: materiaSelecionada, acertos, erros, revisao })
        });
      } catch {}
    }

    function reiniciarQuiz() { iniciarQuiz(materiaSelecionada); }
    function voltarSelecao() {
      document.getElementById('telaResultado').style.display = 'none';
      document.getElementById('telaSelecao').style.display = 'block';
    }

    carregarMaterias();
  </script>
</body>
</html>
