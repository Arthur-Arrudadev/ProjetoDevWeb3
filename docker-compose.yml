version: '3.8'

services:
  db:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "" # Senha vazia para o usuário root, consistente com a configuração original
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" # Permite senha vazia para o root no MySQL 8
      MYSQL_ROOT_PASSWORD: "" # Senha vazia para o usuário root, consistente com a configuração original
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" # Permite senha vazia para o root no MySQL 8
      MYSQL_DATABASE: sistema_estudo
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql # Volume para persistência dos dados do banco
    ports:
      - "3306:3306" # Expõe a porta 3306 para acesso externo, se necessário
      - db_data:/var/lib/mysql # Volume para persistência dos dados do banco
    ports:
      - "3306:3306" # Expõe a porta 3306 para acesso externo, se necessário
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 5s
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: sistema_estudo
      DB_PORT: 3306
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  db_data:
  db_data: